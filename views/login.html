<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LocalLink Pro</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Style CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-container">

    <div class="auth-card animate-fade-in">
        <div class="text-center mb-5">
            <h1 class="navbar-brand d-block mb-2">LocalLink</h1>
            <h2 class="h4 fw-bold">Welcome back</h2>
            <p class="text-muted">Enter your credentials to access your dashboard</p>
        </div>

        <form id="login-form" class="needs-validation" novalidate>
            <div class="mb-4">
                <label for="email" class="form-label fw-medium">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" placeholder="name@example.com" required>
                    <div class="invalid-feedback">Please enter your registered email.</div>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label fw-medium mb-0">Password</label>
                    <a href="#" class="small text-primary text-decoration-none">Forgot password?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required>
                    <div class="invalid-feedback">Please enter your password.</div>
                </div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small text-muted" for="remember">Remember me on this device</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 mb-4" id="login-btn">
                <span>Sign In</span>
                <i class="fa-solid fa-right-to-bracket ms-2"></i>
            </button>
        </form>

        <div class="text-center">
            <p class="text-muted mb-0">Don't have an account? <a href="/views/signup.html" class="fw-semibold text-primary text-decoration-none">Sign up now</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }

            const btn = document.getElementById('login-btn');
            const btnContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Authenticating...';

            const credentials = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await loginUser(credentials);
                if (res.token) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Authenticated!',
                        text: 'Redirecting to your dashboard...',
                        confirmButtonColor: '#6366f1',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        const user = res.user || res.userData || JSON.parse(sessionStorage.getItem('user'));
                        window.location.href = user.role === 'provider' ? '/views/provider-dashboard.html' : '/views/customer-dashboard.html';
                    });
                } else {
                    throw new Error(res.message || 'Login failed. Please check your credentials.');
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Error',
                    text: err.message,
                    confirmButtonColor: '#ef4444'
                });
            } finally {
                btn.disabled = false;
                btn.innerHTML = btnContent;
            }
        });
    </script>
</body>
</html>
