<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate Service | LocalLink Pro</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">LocalLink</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/views/search.html">Explore</a></li>
                    <li class="nav-item"><a class="nav-link" href="/views/categories.html">Categories</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3 guest-only">
                    <a href="/views/login.html" class="nav-link fw-semibold">Login</a>
                    <a href="/views/signup.html" class="btn btn-primary px-4">Join Hub</a>
                </div>
                <div class="d-flex align-items-center gap-3 auth-only d-none">
                    <a href="#" class="nav-link fw-semibold user-dash-link">My Dashboard</a>
                    <div class="dropdown">
                        <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fa-regular fa-user me-1"></i> <span id="user-name-display">Account</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                            <li><a class="dropdown-item user-dash-link" href="#"><i class="fa-solid fa-gauge me-2"></i>Dashboard</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logout-btn"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5 text-center">
        <div class="animate-fade-in">
            <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 rounded-pill fw-bold small mb-3">Service Initiation</span>
            <h1 class="display-3 fw-800 text-dark mb-4">Find Your Professional</h1>
            <p class="lead text-muted mb-5 px-lg-5">Pick a category or browse all our verified local experts to start your service journey.</p>
        </div>

        <div class="row g-4 d-flex justify-content-center mb-5 animate-fade-in" style="animation-delay: 0.1s;" id="categories-grid-booking">
             <!-- Categories dynamically loaded -->
             <div class="col-12"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
        
        <div class="py-5 border-top border-light-subtle animate-fade-in" style="animation-delay: 0.2s;">
            <p class="small text-muted mb-4 fw-bold text-uppercase letter-spacing-1">Prefer to browse everything?</p>
            <a href="/views/search.html" class="btn btn-outline-primary px-5 py-3 fw-bold rounded-pill shadow-sm">
                Explore All Providers <i class="fa-solid fa-magnifying-glass ms-2"></i>
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            updateAuthUI();
            try {
                const res = await fetch('/api/services/categories');
                const categories = await res.json();
                const grid = document.getElementById('categories-grid-booking');
                
                if (categories.length === 0) {
                   grid.innerHTML = '<div class="col-12 text-muted">No categories available at the moment.</div>';
                   return;
                }

                grid.innerHTML = categories.slice(0, 4).map((cat, index) => `
                    <div class="col-md-3">
                        <div class="card category-card p-4 h-100 border-0 shadow-sm" style="animation-delay: ${index * 0.05}s"
                             onclick="location.href='/views/search.html?category=${cat.id}'">
                            <div class="category-icon shadow-sm mb-3 mx-auto">
                                <i class="${getFallbackIcon(cat.name)}"></i>
                            </div>
                            <h6 class="fw-bold mb-0 text-dark">${cat.name}</h6>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading booking categories:', err);
            }
        });

        function getFallbackIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('plumb')) return 'fa-solid fa-faucet-drip';
            if (n.includes('elect')) return 'fa-solid fa-bolt';
            if (n.includes('clean')) return 'fa-solid fa-broom';
            return 'fa-solid fa-briefcase';
        }
    </script>
</body>
</html>
