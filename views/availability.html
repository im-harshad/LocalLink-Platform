<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Availability | LocalLink Pro</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Style CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">LocalLink <span class="badge bg-primary ms-2 fs-6 fw-normal">PRO</span></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/views/provider-dashboard.html">Control Center</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/views/availability.html">Availability</a></li>
                    <li class="nav-item"><a class="nav-link" href="/views/index.html">Live Site</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <div class="dropdown">
                        <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fa-regular fa-star me-1 text-warning"></i> <span id="user-name-display">Professional</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                            <li><a class="dropdown-item" href="/"><i class="fa-solid fa-house me-2"></i>Home</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logout-btn"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">Availability Calendar</h3>
                <p class="text-muted mb-0">Manage your working hours and available slots.</p>
            </div>
            <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addSlotModal">
                <i class="fa-solid fa-plus me-2"></i> Add Slot
            </button>
        </div>

        <div class="card border-0 shadow-sm p-4 animate-fade-in">
            <h5 class="fw-bold mb-4">Your Upcoming Slots</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-light">
                        <tr class="small text-muted text-uppercase">
                            <th>Date</th>
                            <th>Time Slot</th>
                            <th>Duration (mins)</th>
                            <th>Capacity</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="slots-table-body" class="small">
                        <tr>
                            <td colspan="6" class="text-center py-5">
                                <div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div>
                                Loading slots...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Slot Modal -->
    <div class="modal fade" id="addSlotModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Add Availability Slot</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="add-slot-form" class="needs-validation">
                        <div class="mb-3">
                            <label for="slot_date" class="form-label fw-bold small">Date</label>
                            <input type="date" id="slot_date" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="start_time" class="form-label fw-bold small">Start Time</label>
                                <input type="time" id="start_time" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="end_time" class="form-label fw-bold small">End Time</label>
                                <input type="time" id="end_time" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="slot_duration" class="form-label fw-bold small">Duration (Mins)</label>
                                <input type="number" id="slot_duration" class="form-control" value="60" min="15" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="max_slots" class="form-label fw-bold small">Capacity (Max Bookings)</label>
                                <input type="number" id="max_slots" class="form-control" value="1" min="1" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" id="save-slot-btn">Save Slot</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            const user = JSON.parse(sessionStorage.getItem('user'));
            if (!user || user.role !== 'provider') {
                window.location.replace('/');
                return;
            }
            
            // Set User Name
            const userNameEl = document.getElementById('user-name-display');
            if (userNameEl) userNameEl.textContent = user.name;
            
            // Set Min Date constraint to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('slot_date').setAttribute('min', today);

            loadProviderSlots();
        });

        async function loadProviderSlots() {
            const user = JSON.parse(sessionStorage.getItem('user'));
            const providerId = user.provider_id || user.id;
            
            try {
                const res = await fetch(`/api/availability/${providerId}`);
                const data = await res.json();
                
                const tbody = document.getElementById('slots-table-body');
                
                if (!data.success || !data.slots || data.slots.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">No availability slots found. Add your first slot!</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.slots.map(slot => {
                    // Safe parsing of date assuming it's returned by MySQL
                    const slotDate = new Date(slot.date).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                    
                    const formatTime = (timeStr) => {
                        if (!timeStr) return '';
                        const [h, m] = timeStr.split(':');
                        const ampm = Math.floor(h) >= 12 ? 'PM' : 'AM';
                        const hr12 = h % 12 || 12;
                        return `${hr12}:${m} ${ampm}`;
                    };
                    const start = formatTime(slot.start_time);
                    const end = formatTime(slot.end_time);
                    
                    const statusBadge = slot.is_available 
                        ? '<span class="badge bg-success-subtle text-success px-2 py-1 rounded-pill">Available</span>'
                        : '<span class="badge bg-danger-subtle text-danger px-2 py-1 rounded-pill">Unavailable</span>';

                    return `
                        <tr>
                            <td class="fw-bold">${slotDate}</td>
                            <td>${start} - ${end}</td>
                            <td>${slot.slot_duration} mins</td>
                            <td>${slot.max_slots} client(s)</td>
                            <td>${statusBadge}</td>
                            <td class="text-end">
                                <div class="btn-group btn-group-sm rounded-pill overflow-hidden border">
                                    <button class="btn btn-light px-3" onclick="toggleSlot(${slot.id})" title="Toggle Availability">
                                        <i class="fa-solid fa-power-off ${slot.is_available ? 'text-success' : 'text-danger'}"></i>
                                    </button>
                                    <button class="btn btn-light px-3 text-danger" onclick="deleteSlot(${slot.id})" title="Delete Slot">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load slots', err);
                const tbody = document.getElementById('slots-table-body');
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-danger">Failed to load slots. Please try again.</td></tr>`;
            }
        }

        document.getElementById('add-slot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-slot-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div>Saving...';

            const token = sessionStorage.getItem('token');
            const data = {
                slots: [{
                    date: document.getElementById('slot_date').value,
                    start_time: document.getElementById('start_time').value,
                    end_time: document.getElementById('end_time').value,
                    slot_duration: parseInt(document.getElementById('slot_duration').value),
                    max_slots: parseInt(document.getElementById('max_slots').value),
                    is_available: 1
                }]
            };

            try {
                const res = await fetch('/api/availability', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (res.ok && result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Slot Added!',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000
                    });
                    
                    // Close modal
                    const modalEl = document.getElementById('addSlotModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();
                    
                    // Reset form and reload
                    document.getElementById('add-slot-form').reset();
                    loadProviderSlots();
                } else {
                    Swal.fire('Error', result.message || 'Failed to add slot', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Network connection failed', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Save Slot';
            }
        });

        async function toggleSlot(slotId) {
            const token = sessionStorage.getItem('token');
            try {
                const res = await fetch(`/api/availability/${slotId}/toggle`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    loadProviderSlots();
                } else {
                    Swal.fire('Error', 'Failed to toggle availability', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteSlot(slotId) {
            const confirm = await Swal.fire({
                title: 'Are you sure?',
                text: "This time slot will be permanently removed.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Yes, delete it!'
            });

            if (!confirm.isConfirmed) return;

            const token = sessionStorage.getItem('token');
            try {
                const res = await fetch(`/api/availability/${slotId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Deleted!',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000
                    });
                    loadProviderSlots();
                } else {
                    Swal.fire('Error', 'Failed to delete slot', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
